<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeForge AI</title>
  <!-- Office JS — required to read Excel data -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 12px 14px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .logo-text { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .status {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #64748b;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; }

    /* ── Hint banner ── */
    .hint {
      padding: 8px 14px;
      background: rgba(59,130,246,0.07);
      border-bottom: 1px solid rgba(59,130,246,0.15);
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
      flex-shrink: 0;
    }
    .hint strong { color: #94a3b8; }

    /* ── Chat area ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

    .msg {
      max-width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      color: #bfdbfe;
      align-self: flex-end;
    }
    .msg.ai {
      background: #161b26;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
      white-space: pre-wrap;
    }
    .msg.status-msg {
      background: transparent;
      border: none;
      color: #475569;
      font-size: 11px;
      align-self: center;
      padding: 4px 0;
    }
    .msg.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .cursor {
      display: inline-block;
      width: 2px; height: 13px;
      background: #3b82f6;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Input area ── */
    .input-area {
      padding: 10px 14px;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #161b26;
      border: 1px solid #1e293b;
      border-radius: 9px;
      color: #e2e8f0;
      font-size: 12.5px;
      font-family: inherit;
      padding: 8px 11px;
      resize: none;
      min-height: 38px;
      max-height: 90px;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #334155; }

    button {
      background: #3b82f6;
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
      height: 38px;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .sub-hint {
      font-size: 10.5px;
      color: #334155;
      margin-top: 5px;
    }

    /* ── Empty state ── */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #334155;
      text-align: center;
      padding: 20px;
    }
    .empty-icon { font-size: 28px; }
    .empty-title { font-size: 13px; font-weight: 600; color: #475569; }
    .empty-sub { font-size: 11px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text">CodeForge AI</div>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">
    <strong>How to use:</strong> Select cells in Excel → type your question → click Ask
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <div class="empty-icon">📊</div>
      <div class="empty-title">Ask about your Excel data</div>
      <div class="empty-sub">
        Select the cells you want to ask about,<br>
        then type a question below.
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="question"
        placeholder="e.g. What is the profit before tax for Mar-23?"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="askBtn" onclick="ask()" disabled>Ask</button>
    </div>
    <div class="sub-hint" id="subHint">Select cells in Excel first, then ask a question</div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
