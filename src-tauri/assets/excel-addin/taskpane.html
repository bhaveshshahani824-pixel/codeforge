<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeForge AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 10px 14px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .logo-text { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
    .status-dot.connected { background: #22c55e; }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: flex;
      padding: 8px 14px;
      gap: 6px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 7px;
      color: #64748b;
      font-size: 11.5px;
      font-weight: 600;
      padding: 5px 10px;
      cursor: pointer;
      height: auto;
      transition: all 0.15s;
    }
    .mode-btn:hover:not(:disabled) { background: #161b26; color: #94a3b8; }
    .mode-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Chat ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

    .msg {
      max-width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 12.5px;
      line-height: 1.6;
      word-break: break-word;
    }
    .msg.user {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.2);
      color: #bfdbfe;
      align-self: flex-end;
    }
    .msg.ai {
      background: #161b26;
      border: 1px solid #1e293b;
      color: #e2e8f0;
      align-self: flex-start;
      white-space: pre-wrap;
      width: 100%;
    }
    .msg.status-msg {
      background: transparent;
      border: none;
      color: #334155;
      font-size: 10.5px;
      align-self: center;
      padding: 2px 0;
    }
    .msg.error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }
    .cursor {
      display: inline-block; width: 2px; height: 13px;
      background: #3b82f6; margin-left: 2px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Insert button (formula mode) ── */
    .insert-btn {
      display: block; margin-top: 10px; width: 100%;
      background: #14532d; border: 1px solid #16a34a; border-radius: 7px;
      color: #86efac; font-size: 11.5px; font-weight: 600;
      padding: 7px 12px; cursor: pointer; height: auto; text-align: center;
      transition: background 0.15s;
    }
    .insert-btn:hover { background: #166534; }

    /* ── Input area ── */
    .input-area { padding: 10px 14px; border-top: 1px solid #1e293b; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    textarea {
      flex: 1; background: #161b26; border: 1px solid #1e293b;
      border-radius: 9px; color: #e2e8f0; font-size: 12.5px;
      font-family: inherit; padding: 8px 11px; resize: none;
      min-height: 38px; max-height: 90px; outline: none;
      line-height: 1.5; transition: border-color 0.2s;
    }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #334155; }
    button {
      background: #3b82f6; border: none; border-radius: 9px;
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 9px 14px; cursor: pointer; flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s; height: 38px; white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .sub-hint { font-size: 10.5px; color: #334155; margin-top: 5px; }

    /* ── Build mode ── */
    .action-log { list-style: none; padding: 0; margin: 6px 0 0; font-size: 11.5px; }
    .action-log li {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: #94a3b8;
    }
    .action-log li:last-child { border-bottom: none; }
    .action-log li.ok   { color: #86efac; }
    .action-log li.err  { color: #fca5a5; }
    .action-log .act-icon { flex-shrink: 0; width: 14px; text-align: center; }
    .build-thinking {
      display: flex; align-items: center; gap: 8px;
      font-size: 11.5px; color: #64748b; padding: 6px 0;
    }
    .build-spinner {
      width: 12px; height: 12px; border: 2px solid #1e293b;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .build-chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
      border-radius: 5px; padding: 2px 7px; font-size: 10.5px;
      color: #93c5fd; font-weight: 600; margin: 2px 2px 0 0;
    }

    /* ── Macro overlay ── */
    .macro-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 999; display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .macro-overlay-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 20px; width: 100%; max-width: 300px;
    }
    .macro-overlay-title { font-size: 13px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
    .macro-steps { list-style: none; padding: 0; margin: 0 0 10px; }
    .macro-steps li {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; border-bottom: 1px solid #1e293b; font-size: 12px; color: #94a3b8;
    }
    .macro-steps li:last-child { border-bottom: none; }
    .macro-step-num {
      width: 22px; height: 22px; border-radius: 50%; background: #1D6F42;
      color: #86efac; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .macro-key {
      background: #0f172a; border: 1px solid #334155; border-radius: 4px;
      padding: 1px 6px; font-size: 11px; font-weight: 600; color: #f1f5f9;
    }
    .macro-warn { font-size: 10.5px; color: #475569; margin-top: 8px; }
    .macro-ok-btn {
      margin-top: 14px; width: 100%; background: #1D6F42; border: 1px solid #16a34a;
      border-radius: 8px; color: #86efac; font-size: 12px; font-weight: 600;
      padding: 8px; cursor: pointer; height: auto;
    }
    .macro-ok-btn:hover { background: #166534; }

    /* ── Empty state ── */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: #334155; text-align: center; padding: 20px;
    }
    .empty-icon { font-size: 28px; }
    .empty-title { font-size: 13px; font-weight: 600; color: #475569; }
    .empty-sub { font-size: 11px; line-height: 1.6; color: #334155; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div class="logo-text">CodeForge AI</div>
    </div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="modeAsk"     onclick="setMode('ask')">📊 Ask</button>
    <button class="mode-btn"        id="modeFormula" onclick="setMode('formula')">✏️ Formula</button>
    <button class="mode-btn"        id="modeMacro"   onclick="setMode('macro')">🔧 Macro</button>
    <button class="mode-btn"        id="modeBuild"   onclick="setMode('build')">🏗️ Build</button>
  </div>

  <div class="chat" id="chat">
    <div class="empty" id="emptyState">
      <div class="empty-icon" id="emptyIcon">📊</div>
      <div class="empty-title" id="emptyTitle">Ask about your data</div>
      <div class="empty-sub" id="emptySub">
        Select cells in Excel, then ask a question below.
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="question"
        placeholder="e.g. What is revenue for 2023?"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="askBtn" onclick="ask()" disabled>Ask</button>
    </div>
    <div class="sub-hint" id="subHint">Select cells in Excel, then ask a question</div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
